services:
  postgres:
    image: postgres:16
    container_name: searport-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: searport
    ports:
      - "5432:5432"
    volumes:
      - ./docker/postgres-data:/var/lib/postgresql/data
      - ./docker/initdb:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d searport"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  pgweb:
    image: sosedoff/pgweb:0.16.2
    container_name: tilla-pgweb
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/searport?sslmode=disable
    ports:
      - "8081:8081"
